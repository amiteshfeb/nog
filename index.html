<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bereken je Budget AOV in 10 minuten. Flexibele dekking, maandelijks opzegbaar, vanaf €29 per maand." />
    <meta property="og:title" content="Nog Gemakkelijker | Budget AOV vanaf €29 per maand" />
    <meta property="og:description" content="Bereken je Budget AOV in 10 minuten. Flexibele dekking, maandelijks opzegbaar, vanaf €29 per maand." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nog-gemakkelijker.nl/" />
    <meta property="og:image" content="https://nog-gemakkelijker.nl/favicon.png" />
    <title>Nog Gemakkelijker | Verzekeringen voor freelancers en ondernemers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <div id="gt-wrapper" class="gt-widget">
      <button id="gt-toggle" class="gt-toggle" type="button" aria-label="Language switcher" onclick="toggleGTMenu()">
        <span id="gt-current-flag" class="gt-flag">🇳🇱</span>
        <span id="gt-current-label" class="gt-label">Nederlands</span>
        <span class="gt-caret">▾</span>
      </button>
      <div id="gt-menu" class="gt-menu">
        <button type="button" class="gt-menu-item" onclick="setGTLanguage('nl', 'NL', '🇳🇱')">
          <span class="gt-flag">🇳🇱</span><span class="gt-label">NL</span>
        </button>
        <button type="button" class="gt-menu-item" onclick="setGTLanguage('en', 'EN', '🇬🇧')">
          <span class="gt-flag">🇬🇧</span><span class="gt-label">EN</span>
        </button>
      </div>
      <div id="google_translate_element" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'nl', includedLanguages: 'en,nl', autoDisplay: false },
          'google_translate_element'
        );
      }

      function setGTLanguage(lang, label, flag) {
        const combo = document.querySelector('.goog-te-combo');
        if (!combo) return;
        if (combo.value === lang) {
          closeGTMenu();
          return;
        }
        combo.value = lang;
        combo.dispatchEvent(new Event('change'));
        if (label) {
          document.getElementById('gt-current-label').textContent = label;
        }
        if (flag) {
          document.getElementById('gt-current-flag').textContent = flag;
        }
        closeGTMenu();
      }

      function toggleGTMenu() {
        const menu = document.getElementById('gt-menu');
        menu.classList.toggle('open');
      }

      function closeGTMenu() {
        const menu = document.getElementById('gt-menu');
        menu.classList.remove('open');
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
